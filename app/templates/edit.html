{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-8 col-lg-7">
    <div class="d-flex align-items-center mb-4">
      <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary btn-sm me-3">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h3 class="fw-bold mb-0">Edit Article</h3>
    </div>

    <div class="card p-4">
      {% if article[4] %}
      <div class="mb-3">
        <label class="form-label fw-semibold text-muted small">Current Image</label><br>
        <img src="{{ article[4] }}" alt="Current" style="max-height:160px;border-radius:8px;object-fit:cover"/>
      </div>
      {% endif %}

      <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
          <label class="form-label fw-semibold">Title</label>
          <input type="text" name="title" class="form-control" value="{{ article[1] }}" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Author</label>
          <input type="text" name="author" class="form-control" value="{{ article[2] }}" required/>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Body</label>
          <textarea name="body" class="form-control" rows="7" required>{{ article[3] }}</textarea>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Replace Image (optional)</label>
          <input type="file" name="image" class="form-control" accept="image/*"/>
          <div class="form-text">Leave empty to keep the existing image.</div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>Save Changes
          </button>
          <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
